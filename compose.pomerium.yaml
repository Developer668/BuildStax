name: buildstax-access

services:
  pomerium:
    image: pomerium/pomerium@sha256:e10d1d267af24f581157f485d9b0bc08469e2428675b696a08e42ceb09b2279c # v0.32.7
    restart: unless-stopped
    environment:
      POMERIUM_ZERO_TOKEN: ${POMERIUM_CLUSTER_TOKEN:?POMERIUM_CLUSTER_TOKEN is required}
      HEALTH_CHECK_ADDR: 0.0.0.0:28080
      XDG_CACHE_HOME: /var/cache
    ports:
      - "443:443"
      - "127.0.0.1:28080:28081"
    volumes:
      - pomerium-cache:/var/cache
    healthcheck:
      # Route reachability depends on public DNS/NAT; core service health does not.
      test: ["CMD", "pomerium", "health", "--exclude", "routes.reachable"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  health-forwarder:
    image: alpine/socat@sha256:beb4a68d9e4fe6b0f21ea774a0fde6c31f580dde6368939ed70100c5385b015e # 1.8.0.3
    restart: unless-stopped
    network_mode: service:pomerium
    depends_on:
      pomerium:
        condition: service_started
    command: ["TCP-LISTEN:28081,fork,reuseaddr,bind=0.0.0.0", "TCP:127.0.0.1:28080"]
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pomerium-cache:
